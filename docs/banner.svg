<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">CarVerse Drive</title>
  <desc id="desc">A premium automotive telemetry banner for CarVerse Drive.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#07101b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37d8ff"/>
      <stop offset="0.52" stop-color="#d9ff4a"/>
      <stop offset="1" stop-color="#37d8ff"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf3ff"/>
      <stop offset="0.56" stop-color="#eaf3ff"/>
      <stop offset="0.57" stop-color="#d9ff4a"/>
      <stop offset="1" stop-color="#d9ff4a"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#37d8ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#37d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="100" height="60" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 60" fill="none" stroke="#6f8eb6" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="360" rx="12" fill="url(#panel)"/>
  <rect x="1" y="1" width="1598" height="358" rx="11" fill="none" stroke="#324563"/>
  <rect width="1600" height="360" rx="12" fill="url(#grid)"/>
  <ellipse cx="800" cy="180" rx="540" ry="170" fill="url(#halo)"/>

  <!-- restrained technical marks -->
  <g fill="#91a7c7" fill-opacity="0.34">
    <path d="M46 52h12v12H46zm24 0h12v12H70zm-24 24h12v12H46zm24 24h12v12H70z"/>
    <path d="M1518 52h12v12h-12zm24 0h12v12h-12zm0 24h12v12h-12zm-24 24h12v12h-12z"/>
  </g>

  <!-- left telemetry emblem: abstract race car / CV monogram -->
  <g transform="translate(112 115)">
    <circle cx="66" cy="66" r="64" fill="#0a1728" stroke="#415a7b" stroke-width="1.5"/>
    <circle cx="66" cy="66" r="52" fill="none" stroke="#37d8ff" stroke-opacity="0.28" stroke-dasharray="3 7"/>
    <path d="M29 77h18l10-25h19l10 25h18l-7 14H36z" fill="none" stroke="#d9ff4a" stroke-width="3" stroke-linejoin="round"/>
    <path d="M51 78h30M57 52h18" stroke="#eaf3ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="42" cy="91" r="7" fill="#08111f" stroke="#37d8ff" stroke-width="3"/>
    <circle cx="90" cy="91" r="7" fill="#08111f" stroke="#37d8ff" stroke-width="3"/>
    <text x="66" y="121" text-anchor="middle" fill="#a9bdd8" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">CV / 01</text>
  </g>

  <!-- wordmark -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="800" y="138" text-anchor="middle" fill="url(#wordmark)" font-size="64" font-weight="800" letter-spacing="8">CARVERSE DRIVE</text>
    <text x="800" y="178" text-anchor="middle" fill="#a9bdd8" font-size="16" font-weight="700" letter-spacing="6">VERIFIED PERFORMANCE FOR THE MODERN DEALERSHIP</text>
  </g>

  <!-- enterprise game telemetry labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.3">
    <g transform="translate(437 214)"><rect width="146" height="30" rx="15" fill="#0a1a2b" stroke="#345373"/><circle cx="18" cy="15" r="4" fill="#37d8ff"/><text x="32" y="19" fill="#c8d8ed">REAL EVENT DATA</text></g>
    <g transform="translate(603 214)"><rect width="184" height="30" rx="15" fill="#0a1a2b" stroke="#345373"/><circle cx="18" cy="15" r="4" fill="#d9ff4a"/><text x="32" y="19" fill="#c8d8ed">VERIFIED MILESTONES</text></g>
    <g transform="translate(807 214)"><rect width="152" height="30" rx="15" fill="#0a1a2b" stroke="#345373"/><circle cx="18" cy="15" r="4" fill="#37d8ff"/><text x="32" y="19" fill="#c8d8ed">LIVE COMPETITION</text></g>
    <g transform="translate(979 214)"><rect width="176" height="30" rx="15" fill="#0a1a2b" stroke="#345373"/><circle cx="18" cy="15" r="4" fill="#d9ff4a"/><text x="32" y="19" fill="#c8d8ed">FAIR BY DESIGN</text></g>
  </g>

  <text x="800" y="282" text-anchor="middle" fill="#7993b5" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" letter-spacing="3">DATA-DRIVEN GAMIFICATION ENGINE · MULTI-BRANCH DEALERSHIP GROUP</text>

  <!-- animated telemetry runway -->
  <g transform="translate(76 316)">
    <path d="M0 0H1448" stroke="#253b58" stroke-width="2"/>
    <path d="M0 0H1448" stroke="url(#accent)" stroke-width="2" stroke-dasharray="170 1278" filter="url(#softGlow)">
      <animate attributeName="stroke-dashoffset" values="0;-1448" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="5" fill="#37d8ff"/><circle cx="1448" cy="0" r="5" fill="#d9ff4a"/>
  </g>
  <rect x="1" y="1" width="4" height="358" rx="2" fill="url(#accent)"/>
</svg>
