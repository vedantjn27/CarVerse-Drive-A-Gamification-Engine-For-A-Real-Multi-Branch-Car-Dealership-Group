<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 230" role="img" aria-labelledby="title desc">
  <title id="title">CarVerse Drive impact statement</title>
  <desc id="desc">Turning every dealership into a leaderboard, every milestone into momentum.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101b"/>
      <stop offset="0.5" stop-color="#0d1d31"/>
      <stop offset="1" stop-color="#07101b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37d8ff"/>
      <stop offset="0.5" stop-color="#d9ff4a"/>
      <stop offset="1" stop-color="#37d8ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="230" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="1598" height="228" rx="11" fill="none" stroke="#304766"/>
  <path d="M110 65H1490M110 165H1490" stroke="#5b7599" stroke-opacity="0.18"/>

  <!-- telemetry pace marks -->
  <g stroke="#7891b0" stroke-opacity="0.4">
    <path d="M150 52v26m26-15v15m26-26v26m1196-26v26m26-15v15m26-26v26"/>
  </g>
  <g fill="#d9ff4a">
    <circle cx="110" cy="115" r="5"/><circle cx="1490" cy="115" r="5"/>
  </g>

  <!-- moving signal, intentionally subtle -->
  <path d="M110 115H1490" stroke="#253c59" stroke-width="2"/>
  <path d="M110 115H1490" stroke="url(#line)" stroke-width="2" stroke-dasharray="105 1275" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-1380" dur="5s" repeatCount="indefinite"/>
  </path>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="800" y="99" fill="#edf5ff" font-size="27" font-weight="700" letter-spacing="0.3">Turning every dealership into a leaderboard,</text>
    <text x="800" y="139" fill="#d9ff4a" font-size="27" font-weight="700" letter-spacing="0.3">every milestone into momentum.</text>
    <text x="800" y="188" fill="#8ea8c6" font-size="12" font-weight="700" letter-spacing="4">CARVERSE DRIVE · VERIFIED WORK. VISIBLE MOMENTUM.</text>
  </g>
</svg>
